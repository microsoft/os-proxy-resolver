name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows: pure Rust — no C toolchain, no QuickJS.
          - name: windows x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            run_tests: true
          - name: windows arm64
            os: windows-11-arm
            target: aarch64-pc-windows-msvc
            run_tests: true

          # macOS: native runners provide the C toolchain for QuickJS.
          - name: macos arm64
            os: macos-latest
            target: aarch64-apple-darwin
            run_tests: true
          - name: macos x64
            os: macos-15-intel
            target: x86_64-apple-darwin
            run_tests: true

          # Linux x86_64: native.
          - name: linux x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            run_tests: true

          # Linux ARM: cross — its images ship the C cross-toolchain
          # QuickJS needs, and run tests under qemu.
          - name: linux aarch64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            use_cross: true
            run_tests: true
          - name: linux armv7
            os: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
            use_cross: true
            run_tests: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
          rustup target add ${{ matrix.target }}
        shell: bash

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Build
        run: ${{ matrix.use_cross && 'cross' || 'cargo' }} build --target ${{ matrix.target }} --all-features --examples
        shell: bash

      - name: Test
        if: matrix.run_tests
        run: ${{ matrix.use_cross && 'cross' || 'cargo' }} test --target ${{ matrix.target }} --all-features
        shell: bash

      - name: Build proxytester (release)
        run: ${{ matrix.use_cross && 'cross' || 'cargo' }} build --release --target ${{ matrix.target }} --example proxytester
        shell: bash

      - name: Stage proxytester artifact
        run: |
          ext=""
          case "${{ matrix.target }}" in
            *windows*) ext=".exe" ;;
          esac
          stage="dist/proxytester-${{ matrix.target }}"
          mkdir -p "$stage"
          # QuickJS is statically linked into the binary, so proxytester is
          # self-contained (WinHTTP handles PAC on Windows).
          cp "target/${{ matrix.target }}/release/examples/proxytester${ext}" "$stage/"
        shell: bash

      - name: Upload proxytester artifact
        uses: actions/upload-artifact@v4
        with:
          name: proxytester-${{ matrix.target }}
          path: dist/proxytester-${{ matrix.target }}/
          if-no-files-found: error

  os-config-tests:
    name: os config round-trip (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            os: windows-latest
          - name: macos
            os: macos-latest
          - name: linux
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
        shell: bash

      - uses: Swatinem/rust-cache@v2
        with:
          key: os-config-${{ matrix.os }}

      # Linux needs a session bus + dconf backend + the GNOME proxy schema so
      # `gsettings` has somewhere to read/write; the runner image is headless.
      - name: Install GNOME proxy schema (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            dbus dconf-gsettings-backend gsettings-desktop-schemas glib-networking
        shell: bash

      # These tests read the real OS proxy config after configuring it, so they
      # only run here (gated behind OS_PROXY_RESOLVER_OS_TESTS). On Linux the
      # whole thing runs under a private D-Bus session.
      - name: Run OS round-trip tests
        env:
          OS_PROXY_RESOLVER_OS_TESTS: "1"
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            dbus-run-session -- cargo test --all-features os_roundtrip -- --nocapture
          else
            cargo test --all-features os_roundtrip -- --nocapture
          fi
        shell: bash

  lint:
    name: rustfmt + clippy + docs
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt --component clippy --no-self-update
          rustup default stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --all-features --all-targets -- -D warnings
      - run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings
