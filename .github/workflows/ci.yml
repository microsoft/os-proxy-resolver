name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows: pure Rust — no C toolchain, no QuickJS.
          - name: windows x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            run_tests: true
          - name: windows arm64
            os: windows-11-arm
            target: aarch64-pc-windows-msvc
            run_tests: true

          # macOS: native runners provide the C toolchain for QuickJS.
          - name: macos arm64
            os: macos-latest
            target: aarch64-apple-darwin
            run_tests: true
          - name: macos x64
            os: macos-15-intel
            target: x86_64-apple-darwin
            run_tests: true

          # Linux x86_64: native.
          - name: linux x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            run_tests: true

          # Linux ARM: cross — its images ship the C cross-toolchain
          # QuickJS needs, and run tests under qemu.
          - name: linux aarch64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            use_cross: true
            run_tests: true
          - name: linux armv7
            os: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
            use_cross: true
            run_tests: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
          rustup target add ${{ matrix.target }}
        shell: bash

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Build
        run: ${{ matrix.use_cross && 'cross' || 'cargo' }} build --target ${{ matrix.target }} --features tokio --examples
        shell: bash

      - name: Test
        if: matrix.run_tests
        run: ${{ matrix.use_cross && 'cross' || 'cargo' }} test --target ${{ matrix.target }} --features tokio
        shell: bash

      - name: Build proxytester (release)
        run: ${{ matrix.use_cross && 'cross' || 'cargo' }} build --release --target ${{ matrix.target }} --example proxytester
        shell: bash

      - name: Stage proxytester artifact
        run: |
          ext=""
          case "${{ matrix.target }}" in
            *windows*) ext=".exe" ;;
          esac
          stage="dist/proxytester-${{ matrix.target }}"
          mkdir -p "$stage"
          # QuickJS is statically linked into the binary, so proxytester is
          # self-contained (WinHTTP handles PAC on Windows).
          cp "target/${{ matrix.target }}/release/examples/proxytester${ext}" "$stage/"
        shell: bash

      - name: Upload proxytester artifact
        uses: actions/upload-artifact@v4
        with:
          name: proxytester-${{ matrix.target }}
          path: dist/proxytester-${{ matrix.target }}/
          if-no-files-found: error

  os-config-tests:
    name: os config round-trip (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            os: windows-latest
          - name: macos
            os: macos-latest
          - name: linux
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
        shell: bash

      - uses: Swatinem/rust-cache@v2
        with:
          key: os-config-${{ matrix.os }}

      # Linux needs a session bus + dconf backend + the GNOME proxy schema so
      # `gsettings` has somewhere to read/write; the runner image is headless.
      - name: Install GNOME proxy schema (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            dbus dconf-gsettings-backend gsettings-desktop-schemas glib-networking
        shell: bash

      # These tests read the real OS proxy config after configuring it, so they
      # only run here (gated behind OS_PROXY_RESOLVER_OS_TESTS). On Linux the
      # whole thing runs under a private D-Bus session.
      - name: Run OS round-trip tests
        env:
          OS_PROXY_RESOLVER_OS_TESTS: "1"
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            dbus-run-session -- cargo test --features tokio os_roundtrip -- --nocapture
          else
            cargo test --features tokio os_roundtrip -- --nocapture
          fi
        shell: bash

  pac-bench:
    name: WinHTTP vs QuickJS PAC benchmark (windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
        shell: bash

      - uses: Swatinem/rust-cache@v2
        with:
          key: pac-bench

      # The `pac-engine` feature additionally compiles the embedded QuickJS PAC
      # engine on Windows (it is always built off Windows) so it can be timed
      # against WinHTTP on the same PAC script. This is the only build that
      # links QuickJS on Windows — production Windows stays WinHTTP-only / pure
      # Rust. windows-latest ships the MSVC toolchain the QuickJS C sources need.
      - name: Run WinHTTP vs QuickJS PAC benchmark
        run: cargo run --release --example pac_bench --features pac-engine -- --iterations 3000
        shell: bash

  electron-pac-bench:
    name: Electron (Chromium) PAC baseline (windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      # No lockfile is committed (Electron pulls a large platform binary), so
      # install rather than `npm ci`.
      - name: Install Electron
        run: npm install --no-audit --no-fund
        working-directory: bench/electron
        shell: bash

      # Baseline for the Rust pac_bench numbers above: Chromium's own V8 PAC
      # resolver, which is what Electron uses by default (WinHTTP is only used
      # with --use-system-proxy-resolver). Same built-in PAC and URLs.
      # resolveProxy is an async IPC to the network service and is throughput-
      # serialized: --concurrency 32 shows it barely lifts throughput (~1.2x),
      # which is the evidence that the ~250-310 calls/s ceiling is async-IPC
      # cost (plus Windows' ~15.6ms timer granularity), not PAC evaluation.
      - name: Run Electron PAC baseline
        run: npm run bench -- --iterations 3000 --concurrency 32
        working-directory: bench/electron
        shell: bash

  lint:
    name: rustfmt + clippy + docs
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt --component clippy --no-self-update
          rustup default stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --all-features --all-targets -- -D warnings
      - run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings

  licenses:
    name: licenses (deny + notices)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-deny and cargo-about
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny,cargo-about
      # Fail if any dependency carries a license outside deny.toml's allow-list.
      - name: Check dependency licenses
        run: cargo deny check licenses bans sources
      # Fail if ThirdPartyNotices.txt is stale relative to the current graph.
      # The comparison ignores blank-line and whitespace differences (-B -w):
      # some crates ship multiple copies of the same license text differing only
      # in whitespace (e.g. miniz_oxide's LICENSE vs LICENSE-MIT.md), and
      # cargo-about picks whichever the filesystem lists first, which varies by
      # OS. We only care that the license *content* matches, not its formatting.
      - name: Verify ThirdPartyNotices.txt is up to date
        run: |
          cargo about generate --all-features about.hbs > ThirdPartyNotices.generated.txt
          if ! diff -u -B -w ThirdPartyNotices.txt ThirdPartyNotices.generated.txt; then
            echo "::error::ThirdPartyNotices.txt is out of date. Run: cargo about generate --all-features about.hbs > ThirdPartyNotices.txt"
            exit 1
          fi

