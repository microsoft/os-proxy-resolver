name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows: pure Rust — no C toolchain, no QuickJS.
          - name: windows x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            run_tests: true
          - name: windows arm64
            os: windows-11-arm
            target: aarch64-pc-windows-msvc
            run_tests: true

          # macOS: native runners provide the C toolchain for QuickJS.
          - name: macos arm64
            os: macos-latest
            target: aarch64-apple-darwin
            run_tests: true
          - name: macos x64
            os: macos-15-intel
            target: x86_64-apple-darwin
            run_tests: true

          # Linux x86_64: native.
          - name: linux x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            run_tests: true

          # Linux ARM: cross — its images ship the C cross-toolchain
          # QuickJS needs, and run tests under qemu.
          - name: linux aarch64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            use_cross: true
            run_tests: true
          - name: linux armv7
            os: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
            use_cross: true
            run_tests: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
          rustup target add ${{ matrix.target }}
        shell: bash

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Build
        run: ${{ matrix.use_cross && 'cross' || 'cargo' }} build --target ${{ matrix.target }} --features tokio --examples
        shell: bash

      - name: Test
        if: matrix.run_tests
        run: ${{ matrix.use_cross && 'cross' || 'cargo' }} test --target ${{ matrix.target }} --features tokio
        shell: bash

      - name: Build proxytester (release)
        run: ${{ matrix.use_cross && 'cross' || 'cargo' }} build --release --target ${{ matrix.target }} --example proxytester
        shell: bash

      - name: Stage proxytester artifact
        run: |
          ext=""
          case "${{ matrix.target }}" in
            *windows*) ext=".exe" ;;
          esac
          stage="dist/proxytester-${{ matrix.target }}"
          mkdir -p "$stage"
          # QuickJS is statically linked into the binary, so proxytester is
          # self-contained (WinHTTP handles PAC on Windows).
          cp "target/${{ matrix.target }}/release/examples/proxytester${ext}" "$stage/"
        shell: bash

      - name: Upload proxytester artifact
        uses: actions/upload-artifact@v4
        with:
          name: proxytester-${{ matrix.target }}
          path: dist/proxytester-${{ matrix.target }}/
          if-no-files-found: error

  os-config-tests:
    name: os config round-trip (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            os: windows-latest
          - name: macos
            os: macos-latest
          - name: linux
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
        shell: bash

      - uses: Swatinem/rust-cache@v2
        with:
          key: os-config-${{ matrix.os }}

      # Linux needs a session bus + dconf backend + the GNOME proxy schema so
      # `gsettings` has somewhere to read/write; the runner image is headless.
      - name: Install GNOME proxy schema (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            dbus dconf-gsettings-backend gsettings-desktop-schemas glib-networking
        shell: bash

      # These tests read the real OS proxy config after configuring it, so they
      # only run here (gated behind OS_PROXY_RESOLVER_OS_TESTS). On Linux the
      # whole thing runs under a private D-Bus session.
      - name: Run OS round-trip tests
        env:
          OS_PROXY_RESOLVER_OS_TESTS: "1"
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            dbus-run-session -- cargo test --features tokio os_roundtrip -- --nocapture
          else
            cargo test --features tokio os_roundtrip -- --nocapture
          fi
        shell: bash

  pac-bench:
    name: PAC benchmark (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows times three engines: WinHTTP + native QuickJS + Wasmtime.
          # The `pac-engine` feature additionally compiles the embedded QuickJS
          # PAC engine on Windows (it is always built off Windows) — this is
          # the only build that links QuickJS on Windows; production Windows
          # stays WinHTTP-only / pure Rust.
          - name: windows
            os: windows-latest
          # macOS/Linux time two engines: native QuickJS + Wasmtime
          # (`pac-engine` is a no-op off Windows). The native runners provide
          # the C toolchain the QuickJS sources need.
          - name: macos
            os: macos-latest
          - name: linux
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
        shell: bash

      - uses: Swatinem/rust-cache@v2
        with:
          key: pac-bench-${{ matrix.name }}

      # Baseline build without the Wasmtime backend, to measure the
      # binary-size delta the `pac-engine-wasmtime` feature contributes.
      - name: Build pac_bench (without wasmtime backend)
        run: |
          cargo build --release --example pac_bench --features pac-engine
          ext=""; [ "$RUNNER_OS" = "Windows" ] && ext=".exe"
          echo "PAC_BENCH_BASE_SIZE=$(wc -c < target/release/examples/pac_bench$ext | tr -d ' ')" >> "$GITHUB_ENV"
        shell: bash

      # Correctness first: the full test suite against both embedded engines
      # (unit tests + PAC corpus + hostile-PAC timeout, each parametrized over
      # the native and Wasmtime backends).
      - name: Test both embedded PAC backends
        run: cargo test --release --features "pac-engine pac-engine-wasmtime"
        shell: bash

      # Time every engine available on this OS on the same PAC script and
      # URLs (WinHTTP on Windows only). pac_bench exits non-zero if the native
      # and Wasmtime backends — which run byte-identical engine sources —
      # disagree on any URL.
      - name: Run PAC benchmark
        run: cargo run --release --example pac_bench --features "pac-engine pac-engine-wasmtime" -- --iterations 3000
        shell: bash

      - name: Report wasmtime backend binary-size delta
        run: |
          ext=""; [ "$RUNNER_OS" = "Windows" ] && ext=".exe"
          full=$(wc -c < target/release/examples/pac_bench$ext | tr -d ' ')
          echo "pac_bench (pac-engine only)          : $PAC_BENCH_BASE_SIZE bytes"
          echo "pac_bench (+ pac-engine-wasmtime)    : $full bytes"
          echo "wasmtime backend binary-size delta   : $((full - PAC_BENCH_BASE_SIZE)) bytes"
        shell: bash

  electron-pac-bench:
    name: Electron (Chromium) PAC baseline (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            os: windows-latest
          - name: macos
            os: macos-latest
          - name: linux
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      # No lockfile is committed (Electron pulls a large platform binary), so
      # install rather than `npm ci`.
      - name: Install Electron
        run: npm install --no-audit --no-fund
        working-directory: bench/electron
        shell: bash

      # Baseline for the Rust pac_bench numbers above, on every OS pac_bench
      # runs on: Chromium's own V8 PAC resolver, which is what Electron uses
      # by default (the OS resolver is only used with
      # --use-system-proxy-resolver). Same built-in PAC and URLs.
      # resolveProxy is an async IPC to the network service and is throughput-
      # serialized: --concurrency 32 shows it barely lifts throughput (~1.2x),
      # which is the evidence that the calls/s ceiling is async-IPC cost (plus
      # timer granularity, ~15.6ms on Windows), not PAC evaluation. The Linux
      # runner is headless, so Electron needs a virtual display (xvfb) and its
      # sandbox disabled (no setuid helper on the runner image).
      - name: Run Electron PAC baseline
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            export ELECTRON_DISABLE_SANDBOX=1
            xvfb-run --auto-servernum npm run bench -- --iterations 3000 --concurrency 32
          else
            npm run bench -- --iterations 3000 --concurrency 32
          fi
        working-directory: bench/electron
        shell: bash

  lint:
    name: rustfmt + clippy + docs
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt --component clippy --no-self-update
          rustup default stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --all-features --all-targets -- -D warnings
      - run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings

  licenses:
    name: licenses (deny + notices)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-deny and cargo-about
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny,cargo-about
      # Fail if any dependency carries a license outside deny.toml's allow-list.
      - name: Check dependency licenses
        run: cargo deny check licenses bans sources
      # Fail if ThirdPartyNotices.txt is stale relative to the current graph.
      # The comparison ignores blank-line and whitespace differences (-B -w):
      # some crates ship multiple copies of the same license text differing only
      # in whitespace (e.g. miniz_oxide's LICENSE vs LICENSE-MIT.md), and
      # cargo-about picks whichever the filesystem lists first, which varies by
      # OS. We only care that the license *content* matches, not its formatting.
      - name: Verify ThirdPartyNotices.txt is up to date
        run: |
          cargo about generate --all-features about.hbs > ThirdPartyNotices.generated.txt
          if ! diff -u -B -w ThirdPartyNotices.txt ThirdPartyNotices.generated.txt; then
            echo "::error::ThirdPartyNotices.txt is out of date. Run: cargo about generate --all-features about.hbs > ThirdPartyNotices.txt"
            exit 1
          fi

